<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vault Pay</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#020817" />

  <!-- iPhone / Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vault Pay" />
  <link rel="apple-touch-icon" href="assets/logo-vaultpay.png" />

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" 
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="hero">
    <div class="hero-overlay"></div>

    <div class="floating-card floating-card-pix">
      <span class="floating-icon">◆</span>
      <div>
        <strong>Pix</strong>
        <small>instantâneo</small>
      </div>
    </div>

    <div class="floating-card floating-card-rate">
      <span class="floating-icon">↗</span>
      <div>
        <strong>98%</strong>
        <small>aprovação</small>
      </div>
    </div>

    <section class="hero-content">
      <img 
        src="assets/logo-vaultpay.png" 
        alt="Vault Pay" 
        class="logo"
      >

      <h1>
        <span>Pagamentos rápidos</span>
        <span>para negócios que</span>
        <span>não podem perder</span>
        <span>vendas.</span>
      </h1>

      <p>
        <span>Receba no pix, cartão e boleto em</span>
        <span>um checkout seguro, simples e</span>
        <span>preparado para vender todos os dias.</span>
      </p>

      <a href="#" class="cta-button">
        <span>Começar agora</span>
        <span class="arrow">→</span>
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
